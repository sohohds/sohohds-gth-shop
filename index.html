<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/png" href="https://i.postimg.cc/CMk5TvWZ/icon-5x.png">
<link rel="apple-touch-icon" href="https://i.postimg.cc/CMk5TvWZ/icon-5x.png">
<title>GARA TÍ HON — #HobbyReplay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Be+Vietnam+Pro:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════ */
:root {
  --black:     #0a0a0a;
  --white:     #f5f2ed;
  --accent:    #c8522a;
  --gray:      #141414;
  --gray-mid:  #1c1c1c;
  --gray-light:#888;
  --border:    rgba(245,242,237,0.08);
  --font-d:    'Oswald', sans-serif;
  --font-b:    'Be Vietnam Pro', sans-serif;
  --font-m:    'Space Mono', monospace;
  --nav-h:     64px;
  --ease:      cubic-bezier(0.23,1,0.32,1);
  --cart-w:    380px;
  --radius:    8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--black); color: var(--white);
  font-family: var(--font-b); overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
img { display: block; max-width: 100%; }
button { font-family: var(--font-b); cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: var(--font-b); }
.hide { display: none !important; }

/* ══════════════════════════════════════
   LOADER (chỉ hiện lần đầu, không có cache)
══════════════════════════════════════ */
.loader {
  position: fixed; inset: 0; background: var(--black);
  z-index: 9000; display: flex; align-items: center; justify-content: center;
  transition: opacity 0.35s var(--ease);
}
.loader.hidden { opacity: 0; pointer-events: none; }
.loader-content { text-align: center; }
.loader-content h1 { font-family: var(--font-d); font-size: 28px; letter-spacing: 5px; margin-bottom: 8px; }
.loader-content p  { color: var(--gray-light); font-size: 12px; }
/* Loader animation giữ nguyên theo style gốc của bạn */
.loader-anim {
  width: 24px; height: 80px; display: block; margin: 0 auto 24px;
  border: 1px solid #FFF; border-radius: 0 0 50px 50px;
  position: relative; box-sizing: border-box;
  background-image: linear-gradient(#D96030 100px, transparent 0);
  background-position: 0px 80px; background-size: 22px 80px;
  background-repeat: no-repeat;
  animation: fillUp 2.4s linear infinite;
}
.loader-anim::after {
  content: ''; box-sizing: border-box; top: -6px; left: 50%;
  transform: translateX(-50%); position: absolute;
  border: 1px solid #FFF; border-radius: 50%; width: 28px; height: 6px;
}
.loader-anim::before {
  content: ''; box-sizing: border-box; left: 0; bottom: -4px;
  border-radius: 50%; position: absolute; width: 6px; height: 6px;
  animation: bubbles 2.4s linear infinite;
}
@keyframes fillUp {
  0%   { background-position: 0px 80px; }
  100% { background-position: 0px 0px; }
}
@keyframes bubbles {
  0%   { box-shadow: 4px -10px rgba(255,255,255,0), 8px 0 rgba(255,255,255,0); }
  40%  { box-shadow: 2px -40px rgba(255,255,255,.5), 8px -60px rgba(255,255,255,.5); }
  80%  { box-shadow: 2px -80px rgba(255,255,255,.4), 8px -120px rgba(255,255,255,0); }
  100% { box-shadow: 4px -100px rgba(255,255,255,0), 8px -90px rgba(255,255,255,0); }
}

/* ══════════════════════════════════════
   SKELETON LOADING (Tầng 3)
══════════════════════════════════════ */
@keyframes shimmer {
  0%   { background-position: -600px 0; }
  100% { background-position: 600px 0; }
}
.skeleton {
  background: linear-gradient(90deg, #1a1a1a 25%, #252525 50%, #1a1a1a 75%);
  background-size: 600px 100%; animation: shimmer 1.4s infinite linear;
  border-radius: 6px;
}
.skeleton-card {
  background: var(--black); padding: 18px;
}
.skeleton-img  { aspect-ratio: 1; border-radius: 6px; margin-bottom: 12px; }
.skeleton-name { height: 14px; margin-bottom: 8px; width: 85%; }
.skeleton-price{ height: 12px; width: 50%; }

/* Cat skeleton */
.skeleton-cat {
  display: inline-block; height: 30px; border-radius: 100px;
  margin: 0 4px 8px;
}

/* ══════════════════════════════════════
   NAVIGATION
══════════════════════════════════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 600;
  height: var(--nav-h); display: flex; align-items: center; gap: 6px;
  padding: 0 24px;
  background: rgba(10,10,10,0.9); backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { flex-shrink: 0; cursor: pointer; line-height: 0; margin-right: 6px; }
.nav-logo img { height: 36px; }
.nav-links { display: flex; align-items: center; gap: 2px; }
.nav-link {
  padding: 6px 13px; border-radius: 100px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.4px;
  color: var(--gray-light); text-transform: uppercase; white-space: nowrap;
  transition: color 0.2s, background 0.2s;
}
.nav-link:hover  { color: var(--white); }
.nav-link.active { background: var(--accent); color: var(--white); }
.nav-link.accent { color: var(--accent); }

/* Search */
.nav-search {
  position: relative; display: flex; align-items: center;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px; padding: 0 8px 0 14px; height: 34px;
  transition: all 0.35s var(--ease); width: 165px;
}
.nav-search:focus-within {
  width: 220px; background: rgba(255,255,255,0.08);
  border-color: var(--accent); box-shadow: 0 0 16px rgba(200,82,42,0.18);
}
.nav-search input { background: transparent; border: none; outline: none; color: var(--white); font-size: 12px; width: 100%; }
.nav-search input::placeholder { color: var(--gray-light); font-size: 11.5px; }
.nav-search-icon { color: var(--gray-light); font-size: 13px; flex-shrink: 0; transition: color 0.2s; }
.nav-search:focus-within .nav-search-icon { color: var(--accent); }
.nav-spacer { flex: 1; }

/* Cart */
.cart-btn { position: relative; font-size: 19px; padding: 4px 6px; line-height: 1; flex-shrink: 0; }
.cart-count {
  position: absolute; top: -3px; right: -5px;
  background: var(--accent); color: var(--white);
  width: 16px; height: 16px; border-radius: 50%;
  font-size: 9px; font-family: var(--font-m); font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}

/* Hamburger */
.hamburger {
  display: none; flex-direction: column; justify-content: center;
  align-items: center; gap: 5px; width: 36px; height: 36px; flex-shrink: 0;
}
.hamburger span {
  display: block; width: 21px; height: 2px; background: var(--white);
  border-radius: 2px; transition: all 0.3s var(--ease); transform-origin: center;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ══════════════════════════════════════
   MOBILE MENU
══════════════════════════════════════ */
.mobile-menu {
  position: fixed; top: var(--nav-h); left: 0; right: 0; z-index: 590;
  background: rgba(10,10,10,0.98); backdrop-filter: blur(28px);
  border-bottom: 1px solid var(--border);
  transform: translateY(-110%); transition: transform 0.38s var(--ease);
  padding: 16px 20px 24px;
}
.mobile-menu.open { transform: translateY(0); }
.mobile-links { display: flex; flex-direction: column; gap: 2px; margin-bottom: 16px; }
.mob-link {
  padding: 12px 15px; border-radius: var(--radius);
  font-size: 14px; font-weight: 600; letter-spacing: 0.4px;
  color: var(--gray-light); text-transform: uppercase; text-align: left;
  transition: all 0.2s;
}
.mob-link:hover  { color: var(--white); background: rgba(255,255,255,0.04); }
.mob-link.active { background: var(--accent); color: var(--white); }
.mob-link.accent { color: var(--accent); }
.mob-search {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px; transition: border-color 0.2s;
}
.mob-search:focus-within { border-color: var(--accent); }
.mob-search input { background: transparent; border: none; outline: none; color: var(--white); font-size: 14px; flex: 1; }
.mob-search input::placeholder { color: var(--gray-light); }
.mob-search-icon { color: var(--gray-light); font-size: 16px; flex-shrink: 0; }

/* ══════════════════════════════════════
   PAGES
══════════════════════════════════════ */
.page { display: none; padding-top: var(--nav-h); min-height: 100vh; animation: fadeUp 0.35s var(--ease); }
.page.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ══════════════════════════════════════
   BUTTON
══════════════════════════════════════ */
.btn {
  display: inline-block; background: var(--accent); color: var(--white);
  padding: 13px 30px; font-size: 11.5px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; border-radius: 4px;
  transition: all 0.25s; cursor: pointer; border: none; font-family: var(--font-b);
}
.btn:hover { background: #d96030; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(200,82,42,0.3); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
.btn-full { width: 100%; text-align: center; }
.btn-out {
  background: #2a2a2a !important; color: #555 !important;
  cursor: not-allowed !important; transform: none !important;
  box-shadow: none !important; border: 1px solid #333 !important;
}

/* ══════════════════════════════════════
   HOME
══════════════════════════════════════ */
.home-hero {
  display: flex; align-items: center; gap: 60px; flex-wrap: wrap;
  padding: 70px 6% 80px; min-height: calc(100vh - var(--nav-h));
}
.home-text { flex: 1; min-width: 260px; }
.home-title {
  font-family: var(--font-d); font-size: clamp(46px, 7vw, 78px);
  line-height: 0.92; margin-bottom: 20px; font-weight: 600;
}
.home-desc { color: var(--gray-light); font-size: 14px; line-height: 1.9; text-align: justify; margin-bottom: 36px; max-width: 480px; }
.home-imgs  { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; min-width: 260px; }
.home-img-cell { aspect-ratio: 1; background: #111; border-radius: var(--radius); overflow: hidden; display: flex; align-items: center; justify-content: center; }
.home-img-cell img { width: 100%; height: 100%; object-fit: cover; }

/* ══════════════════════════════════════
   SHOP — Desktop sidebar
══════════════════════════════════════ */
.shop-wrap { display: flex; }
.shop-sidebar {
  width: 230px; flex-shrink: 0; padding: 30px 14px;
  border-right: 1px solid var(--border);
  position: sticky; top: var(--nav-h);
  height: calc(100vh - var(--nav-h)); overflow-y: auto;
}
.sidebar-title { font-family: var(--font-d); font-size: 14px; letter-spacing: 2px; color: var(--gray-light); margin-bottom: 12px; }
.cat-btn {
  display: block; width: 100%; text-align: left;
  padding: 9px 12px; margin-bottom: 3px;
  border: 1px solid transparent; border-radius: 6px;
  color: var(--gray-light); font-size: 13px; font-weight: 500;
  transition: all 0.2s; white-space: nowrap;
}
.cat-btn:hover  { color: var(--white); border-color: var(--border); }
.cat-btn.active { background: var(--accent); color: var(--white); border-color: var(--accent); }

/* ══════════════════════════════════════
   MOBILE CATEGORY PILL BAR (cuộn ngang)
══════════════════════════════════════ */
.mob-cat-bar {
  display: none;
  position: sticky; top: var(--nav-h); z-index: 100;
  background: rgba(10,10,10,0.95); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 10px 0 10px;
}
.mob-cat-scroll {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 0 14px;
  scrollbar-width: none; -ms-overflow-style: none;
}
.mob-cat-scroll::-webkit-scrollbar { display: none; }
.mob-cat-pill {
  flex-shrink: 0; padding: 7px 16px; border-radius: 100px;
  border: 1px solid var(--border); background: transparent;
  color: var(--gray-light); font-size: 12.5px; font-weight: 600;
  white-space: nowrap; letter-spacing: 0.2px;
  transition: all 0.2s; cursor: pointer; font-family: var(--font-b);
}
.mob-cat-pill:active { transform: scale(0.96); }
.mob-cat-pill.active { background: var(--accent); color: var(--white); border-color: var(--accent); box-shadow: 0 4px 14px rgba(200,82,42,0.3); }

/* ══════════════════════════════════════
   PRODUCT GRID
══════════════════════════════════════ */
.product-grid {
  flex: 1; display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: var(--border); align-content: start;
}
.product-card { background: var(--black); padding: 18px; cursor: pointer; transition: background 0.2s; position: relative; }
.product-card:hover { background: var(--gray); }
.p-img {
  aspect-ratio: 1; background: #111; border-radius: 6px;
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px; position: relative;
}
.p-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s var(--ease); }
.product-card:hover .p-img img { transform: scale(1.06); }
.p-placeholder { font-size: 44px; }
.p-name  { font-size: 12.5px; font-weight: 600; line-height: 1.4; margin-bottom: 5px; }
.p-price { font-family: var(--font-m); font-size: 12px; color: var(--accent); font-weight: 700; }

/* Out of stock badge trên card */
.out-badge {
  position: absolute; top: 8px; left: 8px; z-index: 2;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
  border: 1px solid rgba(255,80,80,0.4);
  color: #ff6b6b; font-size: 9px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 4px;
}
/* Làm mờ ảnh khi hết hàng */
.p-img.is-out img { opacity: 0.45; filter: grayscale(40%); }
/* Giá khi hết hàng */
.price-out { color: #666 !important; font-family: var(--font-b) !important; font-size: 12px !important; font-weight: 500 !important; }

.empty-state { grid-column: 1/-1; padding: 80px 20px; text-align: center; color: var(--gray-light); font-size: 14px; }

/* ══════════════════════════════════════
   VIDEOS
══════════════════════════════════════ */
.videos-wrap { padding: 40px 5%; }
.videos-wrap h2 { font-family: var(--font-d); font-size: 38px; letter-spacing: 2px; margin-bottom: 28px; }
.video-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.video-card {
  background: #000; border-radius: 14px; overflow: hidden;
  aspect-ratio: 9/16; border: 1px solid var(--border); transition: all 0.4s var(--ease);
}
.video-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 12px 30px rgba(0,0,0,0.5); }
.video-card iframe { width: 100%; height: 100%; border: none; }

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.modal {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.88); backdrop-filter: blur(10px);
  padding: 16px; overflow-y: auto;
}
.modal.open { display: flex; align-items: flex-start; justify-content: center; }
.modal-close-btn {
  position: fixed; top: 14px; right: 18px; z-index: 1001;
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--gray-mid); color: var(--gray-light);
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.modal-close-btn:hover { background: var(--accent); color: var(--white); }
.modal-box {
  display: flex; gap: 40px; flex-wrap: wrap;
  max-width: 940px; width: 100%;
  background: var(--gray); border-radius: 14px; padding: 34px;
  margin: 54px auto 20px; animation: modalIn 0.3s var(--ease);
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(12px); } to { opacity: 1; transform: none; } }
.modal-left  { flex: 1.1; min-width: 220px; }
.modal-right { flex: 1;   min-width: 220px; }
.main-img {
  aspect-ratio: 1; background: #111; border-radius: var(--radius);
  overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;
}
.main-img img { width: 100%; height: 100%; object-fit: cover; }
.thumbs { display: flex; gap: 7px; flex-wrap: wrap; }
.thumb {
  width: 56px; height: 56px; border-radius: 6px; overflow: hidden;
  border: 2px solid transparent; cursor: pointer; transition: border-color 0.2s; flex-shrink: 0;
}
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.thumb.active { border-color: var(--accent); }
.modal-badge { font-size: 10px; color: var(--accent); letter-spacing: 2px; font-family: var(--font-m); margin-bottom: 10px; }
.modal-name  { font-family: var(--font-d); font-size: clamp(26px, 3.2vw, 44px); line-height: 1; margin-bottom: 14px; }
.modal-price { font-family: var(--font-m); color: var(--accent); font-size: 22px; font-weight: 700; margin-bottom: 18px; }
.modal-price.out { color: #ff6b6b; font-family: var(--font-b); font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
.modal-desc  { color: rgba(245,242,237,0.68); font-size: 13.5px; line-height: 1.85; text-align: justify; margin-bottom: 22px; }

/* ══════════════════════════════════════
   CART DRAWER
══════════════════════════════════════ */
.cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 700; opacity: 0; pointer-events: none; transition: opacity 0.35s var(--ease); }
.cart-overlay.open { opacity: 1; pointer-events: all; }
#cart-drawer {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 710;
  width: var(--cart-w); max-width: 100vw;
  background: var(--gray-mid); border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform 0.4s var(--ease);
}
#cart-drawer.open { transform: translateX(0); }
.cart-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 22px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.cart-head h2 { font-family: var(--font-d); font-size: 20px; letter-spacing: 2px; }
.cart-head-close { color: var(--gray-light); font-size: 20px; padding: 4px; transition: color 0.2s; }
.cart-head-close:hover { color: var(--white); }
.cart-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.cart-item { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); }
.cart-item-img { width: 66px; height: 66px; border-radius: 6px; background: #111; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 26px; }
.cart-item-img img { width: 100%; height: 100%; object-fit: cover; }
.cart-item-name  { font-size: 12.5px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
.cart-item-price { color: var(--accent); font-size: 11.5px; font-family: var(--font-m); margin-bottom: 10px; }
.qty-row { display: flex; align-items: center; gap: 10px; }
.qty-btn { width: 27px; height: 27px; border-radius: 50%; background: var(--black); border: 1px solid var(--border); color: var(--white); font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.qty-btn:hover { background: var(--accent); border-color: var(--accent); }
.qty-val { font-family: var(--font-m); font-size: 12px; min-width: 18px; text-align: center; }
.cart-empty-msg { text-align: center; opacity: 0.3; padding: 60px 20px; }
.cart-empty-msg p { margin-top: 10px; font-size: 13px; }
.cart-foot { padding: 18px 22px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--black); }
.cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.cart-total-label { font-size: 11px; letter-spacing: 1px; color: var(--gray-light); text-transform: uppercase; }
.cart-total-val   { font-family: var(--font-m); font-size: 18px; color: var(--accent); font-weight: 700; }

/* ══════════════════════════════════════
   OVERLAYS / FORMS
══════════════════════════════════════ */
.overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
.overlay-bg.open { display: flex; }
.form-box { background: var(--gray); border-radius: 14px; padding: 36px; width: 310px; text-align: center; }
.form-box h2 { font-family: var(--font-d); letter-spacing: 2px; margin-bottom: 24px; }
.form-input { width: 100%; padding: 11px 15px; background: var(--black); border: 1px solid var(--border); color: var(--white); border-radius: 6px; font-size: 14px; outline: none; margin-bottom: 12px; transition: border-color 0.2s; text-align: center; }
.form-input:focus { border-color: var(--accent); }
.form-cancel { margin-top: 12px; opacity: 0.4; font-size: 13px; transition: opacity 0.2s; }
.form-cancel:hover { opacity: 0.7; }

<script>
/* ══════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════ */
const _0x4f2a     = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J6UGFpYVVRM2hGYlpIYU1PZXdxN2RUVkVKYjZoQy1pcWpFUUhYZzVHZ19nVTE3bHFqNm11RVl3X2tycWZ4dWhfZmovZXhlYw==";
const API         = atob(_0x4f2a);
const ZALO_NUMBER = "0382949505";

/* ══════════════════════════════════════════════
   CACHE CONFIG (Tầng 1 + Smart Image Cache)
══════════════════════════════════════════════ */
const CACHE_KEY      = 'gth_data_v2';     // data chính (thumbnail + meta, không có full images)
const CACHE_FULL_KEY = 'gth_full_v2';     // full images[] của từng sản phẩm, key = product id
const CACHE_TTL      = 10 * 60 * 1000;   // 10 phút

function saveCache(data) {
  try {
    // Tách full images ra khỏi data chính
    const fullImgs = {};
    const slim = {
      ...data,
      products: data.products.map(p => {
        fullImgs[p.id] = p.images || [];               // lưu full images riêng
        return { ...p, images: p.images?.slice(0,1) }; // giữ lại chỉ thumbnail
      })
    };
    localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: slim }));
    localStorage.setItem(CACHE_FULL_KEY, JSON.stringify(fullImgs));
  } catch(e) {
    // localStorage đầy → bỏ qua, không crash
    console.warn('Cache save failed:', e);
  }
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) return null; // hết hạn
    return data;
  } catch { return null; }
}

function loadFullImages(productId) {
  try {
    const raw = localStorage.getItem(CACHE_FULL_KEY);
    if (!raw) return null;
    const all = JSON.parse(raw);
    return all[productId] || null;
  } catch { return null; }
}

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let products = [], categories = [], videosData = [], token = '';
let cart = [];
try { cart = JSON.parse(localStorage.getItem('gth_cart')) || []; } catch { cart = []; }

/* ══════════════════════════════════════════════
   HELPER — thumbnail URL (Google Drive resize)
══════════════════════════════════════════════ */
function makeThumb(url) {
  if (!url) return url;
  if (url.includes('drive.google.com') || url.includes('lh3.googleusercontent.com') || url.includes('googleusercontent')) {
    return url.replace(/=s\d+$/, '') + '=s400';
  }
  return url;
}

/* ══════════════════════════════════════════════
   LOADER
══════════════════════════════════════════════ */
function hideLoader() {
  const l = document.getElementById('loader');
  l.classList.add('hidden');
  setTimeout(() => { l.style.display = 'none'; }, 380);
}

/* ══════════════════════════════════════════════
   INIT — 3 tầng cache
══════════════════════════════════════════════ */
async function init() {
  renderCart();

  const cached = loadCache();

  /* ── TẦNG 1: Có cache → render ngay, loader biến mất tức thì ── */
  if (cached) {
    applyData(cached);
    hideLoader();                          // biến mất gần như tức thì

    /* ── TẦNG 2: Background refresh (âm thầm, user không bị chặn) ── */
    setTimeout(() => fetchAndRefresh(), 100);
    return;
  }

  /* ── TẦNG 3: Chưa có cache → skeleton đã hiện sẵn trong HTML
     Chỉ cần gọi API, loader KHÔNG hiện (skeleton thay thế) ── */
  hideLoader(); // ẩn loader ngay, skeleton đã sẵn trong HTML rồi
  await fetchAndRefresh(true); // true = lần đầu, cần render sau khi fetch
}

/* ══════════════════════════════════════════════
   FETCH API + lưu cache
══════════════════════════════════════════════ */
async function fetchAndRefresh(isFirstLoad = false) {
  try {
    const res  = await fetch(`${API}?action=public_data`);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    saveCache(data);               // lưu cache mới (Tầng 1 lần sau)
    if (isFirstLoad) applyData(data); // Tầng 3: render sau khi fetch xong
    // Tầng 2: data đã được cache, lần sau sẽ dùng cache mới
  } catch(e) {
    console.warn('Background fetch failed:', e);
    if (isFirstLoad) {
      // Fallback nếu fetch lỗi lần đầu
      document.getElementById('h-title').innerHTML = 'GARA TÍ HON';
      document.getElementById('h-desc').innerHTML  = 'Không thể tải dữ liệu. Vui lòng thử lại.';
    }
  }
}

/* ══════════════════════════════════════════════
   APPLY DATA — đổ data vào UI
══════════════════════════════════════════════ */
function applyData(data) {
  if (data.settings) {
    document.getElementById('h-title').innerHTML = data.settings.home_title || 'GARA TÍ HON';
    document.getElementById('h-desc').innerHTML  = data.settings.home_desc  || '';
    if (data.settings.home_imgs) {
      const imgs = data.settings.home_imgs.split(',').map(s => s.trim()).filter(Boolean);
      document.getElementById('h-imgs').innerHTML = imgs.map(url =>
        `<div class="home-img-cell">
           <img src="${url}" loading="lazy"
                onerror="this.parentNode.innerHTML='<span style=font-size:44px>🏎️</span>'">
         </div>`
      ).join('');
    }
  }
  products   = data.products   || [];
  categories = data.categories || [];
  videosData = data.videos      || [];
  renderShop();
  renderVideos();
}

/* ══════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════ */
let menuOpen = false;

function navTo(pageId, el, fromMobile) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId)?.classList.add('active');
  document.querySelectorAll('#desktop-links .nav-link[data-page]').forEach(b => b.classList.remove('active'));
  document.querySelector(`#desktop-links [data-page="${pageId}"]`)?.classList.add('active');
  document.querySelectorAll('#mobile-menu .mob-link[data-page]').forEach(b => b.classList.remove('active'));
  document.querySelector(`#mobile-menu [data-page="${pageId}"]`)?.classList.add('active');
  if (fromMobile) closeMenu();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleMenu() {
  menuOpen = !menuOpen;
  document.getElementById('mobile-menu').classList.toggle('open', menuOpen);
  document.getElementById('hamburger').classList.toggle('open', menuOpen);
}
function closeMenu() {
  menuOpen = false;
  document.getElementById('mobile-menu').classList.remove('open');
  document.getElementById('hamburger').classList.remove('open');
}

/* ══════════════════════════════════════════════
   SEARCH
══════════════════════════════════════════════ */
function handleSearch(query) {
  query = (query || '').trim().toLowerCase();
  const sd = document.getElementById('search-desktop');
  const sm = document.getElementById('search-mobile');
  if (sd && sd.value.toLowerCase() !== query) sd.value = query;
  if (sm && sm.value.toLowerCase() !== query) sm.value = query;
  if (query) {
    const ap = document.querySelector('.page.active');
    if (ap && ap.id !== 'shop') navTo('shop');
  }
  const filtered = query
    ? products.filter(p =>
        (p.name || '').toLowerCase().includes(query) ||
        (p.desc || '').toLowerCase().includes(query))
    : products;
  renderProductList(filtered, query);
}

/* ══════════════════════════════════════════════
   SHOP
══════════════════════════════════════════════ */
function renderShop() {
  const desktopHtml =
    `<button class="cat-btn active" onclick="filterCat('all',this)">Tất cả</button>` +
    categories.map(c =>
      `<button class="cat-btn" onclick="filterCat('${c.key}',this)">${c.name}</button>`
    ).join('');
  document.getElementById('cat-list').innerHTML = desktopHtml;

  const mobileHtml =
    `<button class="mob-cat-pill active" onclick="filterCat('all',this)">Tất cả</button>` +
    categories.map(c =>
      `<button class="mob-cat-pill" onclick="filterCat('${c.key}',this)">${c.name}</button>`
    ).join('');
  document.getElementById('mob-cat-scroll').innerHTML = mobileHtml;

  renderProductList(products);
}

function filterCat(key, el) {
  // Deactivate cả desktop lẫn mobile buttons
  document.querySelectorAll('.cat-btn, .mob-cat-pill').forEach(b => b.classList.remove('active'));
  // Activate tất cả buttons có cùng text
  document.querySelectorAll('.cat-btn, .mob-cat-pill').forEach(b => {
    if (b.textContent.trim() === el.textContent.trim()) b.classList.add('active');
  });
  renderProductList(key === 'all' ? products : products.filter(p => p.cat === key));
}

/* ══════════════════════════════════════════════
   RENDER PRODUCTS — thumbnail + out-of-stock
══════════════════════════════════════════════ */
function renderProductList(list, query) {
  const grid = document.getElementById('prod-grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state">${
      query ? `Không tìm thấy xe nào khớp với "<strong>${query}</strong>" 🏎️`
             : 'Chưa có sản phẩm trong mục này.'}</div>`;
    return;
  }

  grid.innerHTML = list.map(p => {
    const isOut   = p.status === 'Out Stock';
    const thumbUrl = makeThumb(p.images?.[0]);
    const thumb    = thumbUrl
      ? `<img src="${thumbUrl}" alt="${p.name}" loading="lazy"
              onerror="this.parentNode.innerHTML='<span class=p-placeholder>🏎️</span>'">`
      : `<span class="p-placeholder">🏎️</span>`;

    const priceHtml = isOut
      ? `<span class="price-out">Hết hàng</span>`
      : `${Number(p.price).toLocaleString()}₫`;

    return `
      <div class="product-card" onclick="openDetail('${p.id}')">
        <div class="p-img${isOut ? ' is-out' : ''}">
          ${isOut ? '<span class="out-badge">Hết hàng</span>' : ''}
          ${thumb}
        </div>
        <div class="p-name">${p.name}</div>
        <div class="p-price">${priceHtml}</div>
      </div>`;
  }).join('');
}

/* ══════════════════════════════════════════════
   VIDEOS
══════════════════════════════════════════════ */
function renderVideos() {
  const grid = document.getElementById('video-grid');
  if (!videosData?.length) {
    grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;opacity:.4;padding:40px 0">Chưa có video nào.</p>`;
    return;
  }
  grid.innerHTML = videosData.map(v => {
    const link = (v.key || '').trim();
    if (!link) return '';
    let embed = '';
    if (link.includes('youtube.com') || link.includes('youtu.be')) {
      let id = '';
      if      (link.includes('shorts/')) id = link.split('shorts/')[1].split(/[?&]/)[0];
      else if (link.includes('v='))      id = link.split('v=')[1].split('&')[0];
      else                               id = link.split('/').pop().split('?')[0];
      if (id) embed = `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1`;
    } else if (link.includes('tiktok.com')) {
      const id = link.split('/video/')[1]?.split('?')[0];
      if (id) embed = `https://www.tiktok.com/embed/v2/${id}`;
    }
    return embed ? `
      <div class="video-card">
        <iframe src="${embed}" loading="lazy"
          allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"
          allowfullscreen></iframe>
      </div>` : '';
  }).join('');
}

/* ══════════════════════════════════════════════
   MODAL — dùng full images (từ cache riêng hoặc từ data gốc)
══════════════════════════════════════════════ */
function openDetail(id) {
  const p = products.find(x => String(x.id) === String(id));
  if (!p) return;

  /* Lấy full images: thử cache riêng trước, fallback về p.images */
  const fullImgs = loadFullImages(id) || p.images || [];
  const isOut    = p.status === 'Out Stock';

  const mainHtml = fullImgs.length
    ? `<img id="main-view" src="${fullImgs[0]}" alt="${p.name}"
            onerror="this.parentNode.innerHTML='<span style=font-size:64px;width:100%;height:100%;display:flex;align-items:center;justify-content:center>🏎️</span>'">`
    : `<span style="font-size:64px;width:100%;height:100%;display:flex;align-items:center;justify-content:center">🏎️</span>`;

  const thumbHtml = fullImgs.length > 1
    ? `<div class="thumbs">${fullImgs.map((src, i) =>
        `<div class="thumb ${i===0?'active':''}" onclick="changeImg(this,'${src}')">
           <img src="${src}" loading="lazy"></div>`
      ).join('')}</div>` : '';

  const priceHtml = isOut
    ? `<div class="modal-price out">⛔ Tạm hết hàng</div>`
    : `<div class="modal-price">${Number(p.price).toLocaleString()}₫</div>`;

  const btnHtml = isOut
    ? `<button class="btn btn-full btn-out" disabled>TẠM HẾT HÀNG</button>`
    : `<button class="btn btn-full" onclick="addToCart('${p.id}')">THÊM VÀO GIỎ HÀNG</button>`;

  document.getElementById('modal-box').innerHTML = `
    <div class="modal-left">
      <div class="main-img">${mainHtml}</div>
      ${thumbHtml}
    </div>
    <div class="modal-right">
      <div class="modal-badge">1:64 SCALE ARTISAN</div>
      <h1 class="modal-name">${p.name}</h1>
      ${priceHtml}
      <p class="modal-desc">${p.desc || ''}</p>
      ${p.extra ? `<div style="font-size:13px;color:var(--gray-light);line-height:1.7;margin-bottom:20px">${p.extra}</div>` : ''}
      ${btnHtml}
    </div>`;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function changeImg(el, src) {
  const v = document.getElementById('main-view');
  if (v) v.src = src;
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeMenu(); } });

/* ══════════════════════════════════════════════
   CART
══════════════════════════════════════════════ */
function toggleCart() {
  const open = document.getElementById('cart-drawer').classList.toggle('open');
  document.getElementById('cart-overlay').classList.toggle('open', open);
  document.body.style.overflow = open ? 'hidden' : '';
}

const addSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
addSound.volume = 0.25;

function addToCart(id) {
  const p = products.find(x => String(x.id) === String(id));
  if (!p || p.status === 'Out Stock') return; // chặn thêm hàng khi hết
  const exists = cart.find(x => String(x.id) === String(id));
  if (exists) exists.qty++; else cart.push({ ...p, qty: 1 });
  saveCart(); renderCart(); closeModal(); showToast();
}

function updateQty(id, delta) {
  const item = cart.find(x => String(x.id) === String(id));
  if (item) { item.qty += delta; if (item.qty <= 0) cart = cart.filter(x => String(x.id) !== String(id)); }
  saveCart(); renderCart();
}

function saveCart() {
  try { localStorage.setItem('gth_cart', JSON.stringify(cart)); } catch { }
}

function renderCart() {
  const list = document.getElementById('cart-list');
  let total = 0, count = 0;
  if (!cart.length) {
    list.innerHTML = `<div class="cart-empty-msg"><div style="font-size:36px">🛒</div><p>Giỏ hàng trống</p></div>`;
  } else {
    list.innerHTML = cart.map(item => {
      total += Number(item.price) * item.qty; count += item.qty;
      const thumb = item.images?.[0]
        ? `<img src="${makeThumb(item.images[0])}" alt="${item.name}" onerror="this.style.display='none'">` : '🏎️';
      return `
        <div class="cart-item">
          <div class="cart-item-img">${thumb}</div>
          <div style="flex:1;min-width:0">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">${Number(item.price).toLocaleString()}₫</div>
            <div class="qty-row">
              <button class="qty-btn" onclick="updateQty('${item.id}',-1)">−</button>
              <span class="qty-val">${item.qty}</span>
              <button class="qty-btn" onclick="updateQty('${item.id}',1)">+</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }
  document.getElementById('cart-total').textContent = total.toLocaleString() + '₫';
  document.getElementById('cart-count').textContent = count;
}

function showToast() {
  addSound.currentTime = 0; addSound.play().catch(() => {});
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

async function checkout() {
  if (!cart.length) return;
  let msg = '📦 ĐƠN HÀNG GARA TÍ HON\n─────────────────────\n';
  cart.forEach((item, i) => {
    msg += `${i+1}. ${item.name} ×${item.qty} — ${Number(item.price * item.qty).toLocaleString()}₫\n`;
  });
  msg += `─────────────────────\n💰 TỔNG: ${document.getElementById('cart-total').textContent}\n\n👤 Họ tên:\n📞 SĐT:\n📍 Địa chỉ:`;
  try { await navigator.clipboard.writeText(msg); alert('✅ Đã sao chép! Dán vào Zalo để gửi nhé.'); }
  catch { prompt('Sao chép và gửi qua Zalo:', msg); }
  window.open(`https://zalo.me/${ZALO_NUMBER}`, '_blank');
}

/* ══════════════════════════════════════════════
   AUTH / ADMIN
══════════════════════════════════════════════ */
function openLogin()  { document.getElementById('login-overlay').classList.add('open'); }
function closeLogin() { document.getElementById('login-overlay').classList.remove('open'); }

function checkAuth() {
  const pw = document.getElementById('admin-token').value.trim();
  if (!pw) { alert('Vui lòng nhập mật khẩu!'); return; }
  token = pw;
  document.getElementById('nav-admin').classList.remove('hide');
  document.getElementById('mob-nav-admin').classList.remove('hide');
  document.getElementById('btn-login').classList.add('hide');
  document.getElementById('mob-btn-login').classList.add('hide');
  document.getElementById('edit-title').value = document.getElementById('h-title').textContent || '';
  document.getElementById('edit-desc').value  = document.getElementById('h-desc').textContent  || '';
  closeLogin();
  navTo('admin', document.getElementById('nav-admin'));
}

async function saveAdmin(e) {
  const btn = e.currentTarget; const orig = btn.textContent;
  btn.textContent = 'Đang lưu...'; btn.disabled = true;
  const payload = { token, action: 'save_home',
    title: document.getElementById('edit-title').value,
    desc:  document.getElementById('edit-desc').value };
  try {
    const res = await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
    const result = await res.json();
    if (result.status === 'success') {
      localStorage.removeItem(CACHE_KEY); // xóa cache để force refresh
      alert('✅ Cập nhật thành công!'); location.reload();
    } else alert('❌ Lỗi bảo mật: ' + result.message);
  } catch { alert('❌ Không thể kết nối. Thử lại sau.'); }
  finally { btn.textContent = orig; btn.disabled = false; }
}

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
init();
</script>
