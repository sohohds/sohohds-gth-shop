<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/CMk5TvWZ/icon-5x.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/CMk5TvWZ/icon-5x.png">
    <title>GARA TÍ HON — Professional 1:64 Custom Studio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600&family=Oswald:wght@500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --black: #0a0a0a;
            --gray-dark: #111111;
            --gray: #1a1a1a;
            --gray-light: #888888;
            --white: #f5f2ed;
            --accent: #c8522a; /* Gara Orange */
            --border: rgba(245, 242, 237, 0.08);
            --nav-h: 70px;
            --font-display: 'Oswald', sans-serif;
            --font-body: 'Be Vietnam Pro', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
            --radius: 8px;
        }

        /* Base Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--black); 
            color: var(--white); 
            font-family: var(--font-body); 
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        ul { list-style: none; }
        a { text-decoration: none; color: inherit; }
        button { cursor: pointer; border: none; background: none; font-family: inherit; }
        .hide { display: none !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* Loader */
        .loader {
            position: fixed; inset: 0; background: var(--black); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s var(--ease);
        }
        .loader-icon {
            width: 50px; height: 50px; border: 3px solid rgba(200, 82, 42, 0.1);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Navigation */
        nav {
            position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h);
            background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); z-index: 1000;
            display: flex; align-items: center; padding: 0 5%; gap: 20px;
        }
        .nav-logo img { height: 40px; }
        .nav-links { display: flex; gap: 8px; }
        .nav-link {
            padding: 8px 16px; border-radius: 100px; font-size: 11px;
            font-weight: 600; color: var(--gray-light); text-transform: uppercase;
            transition: 0.3s; white-space: nowrap;
        }
        .nav-link.active { background: var(--accent); color: var(--white); }
        .nav-link:hover:not(.active) { color: var(--white); background: rgba(255,255,255,0.05); }

        .nav-right { display: flex; align-items: center; gap: 15px; margin-left: auto; }

        /* Search Box */
        .search-box {
            position: relative; width: 220px; transition: 0.4s var(--ease);
        }
        .search-box:focus-within { width: 300px; }
        .search-box input {
            width: 100%; background: var(--gray-dark); border: 1px solid var(--border);
            border-radius: 100px; padding: 8px 15px 8px 35px; color: var(--white);
            font-size: 13px; outline: none;
        }
        .search-box input:focus { border-color: var(--accent); }
        .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.4; font-size: 14px; }

        .cart-trigger { position: relative; font-size: 22px; }
        .cart-badge {
            position: absolute; -top: 5px; -right: 8px; background: var(--accent);
            min-width: 18px; height: 18px; border-radius: 50%; font-size: 10px;
            display: flex; align-items: center; justify-content: center; font-weight: 700;
        }

        /* Page System */
        .page { display: none; padding-top: var(--nav-h); min-height: 100vh; animation: pageIn 0.5s var(--ease); }
        .page.active { display: block; }
        @keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Home Hero */
        .hero {
            display: flex; align-items: center; padding: 80px 5%; gap: 60px; flex-wrap: wrap;
        }
        .hero-content { flex: 1.2; min-width: 320px; }
        .hero-content h1 { font-family: var(--font-display); font-size: clamp(48px, 8vw, 90px); line-height: 0.95; margin-bottom: 25px; text-transform: uppercase; }
        .hero-content p { color: var(--gray-light); font-size: 16px; margin-bottom: 40px; max-width: 550px; }
        .hero-visual { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .hero-visual .img-card { aspect-ratio: 1; background: var(--gray-dark); border-radius: var(--radius); overflow: hidden; }
        .hero-visual img { width: 100%; height: 100%; object-fit: cover; }

        /* Shop Layout */
        .shop-layout { display: flex; }
        .sidebar {
            width: 260px; padding: 40px 30px; border-right: 1px solid var(--border);
            position: sticky; top: var(--nav-h); height: calc(100vh - var(--nav-h));
        }
        .sidebar h3 { font-family: var(--font-display); letter-spacing: 2px; margin-bottom: 20px; font-size: 18px; }
        .cat-list { display: flex; flex-direction: column; gap: 5px; }
        .cat-item {
            text-align: left; padding: 10px 15px; border-radius: 6px; color: var(--gray-light);
            font-size: 13px; font-weight: 500; transition: 0.3s;
        }
        .cat-item.active { background: rgba(200, 82, 42, 0.1); color: var(--accent); }

        .main-grid {
            flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1px; background: var(--border);
        }
        .product-card {
            background: var(--black); padding: 30px; transition: 0.4s var(--ease);
        }
        .product-card:hover { background: #0f0f0f; transform: translateY(-5px); }
        .card-img {
            aspect-ratio: 1; background: var(--gray-dark); border-radius: 4px;
            overflow: hidden; margin-bottom: 20px;
        }
        .card-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s var(--ease); }
        .product-card:hover .card-img img { transform: scale(1.1); }
        .card-info h4 { font-size: 15px; font-weight: 500; margin-bottom: 8px; height: 45px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .card-price { color: var(--accent); font-family: var(--font-mono); font-weight: 700; font-size: 16px; }

        /* Video Gallery */
        .video-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px; padding: 40px 5%;
        }
        .video-card {
    background: var(--gray-dark);
    border-radius: 12px;
    overflow: hidden;
    aspect-ratio: 9/16; /* Tỷ lệ chuẩn cho Shorts/TikTok */
    position: relative;
    border: 1px solid var(--border);
    transition: 0.3s var(--ease);
}
        .video-card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .video-card iframe {
    width: 100%;
    height: 100%;
    border: none;
    position: absolute;
    top: 0;
    left: 0;
}
        /* Cart Drawer */
        .drawer {
            position: fixed; top: 0; right: 0; bottom: 0; width: 400px; max-width: 100%;
            background: var(--gray-dark); z-index: 2000; transform: translateX(100%);
            transition: 0.5s var(--ease); display: flex; flex-direction: column;
            box-shadow: -20px 0 60px rgba(0,0,0,0.5);
        }
        .drawer.open { transform: translateX(0); }
        .drawer-header { padding: 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .drawer-content { flex: 1; overflow-y: auto; padding: 20px; }
        .drawer-footer { padding: 30px; background: var(--black); border-top: 1px solid var(--border); }

        .cart-item { display: flex; gap: 15px; margin-bottom: 20px; padding: 15px; background: var(--gray); border-radius: var(--radius); }
        .cart-item img { width: 70px; height: 70px; object-fit: cover; border-radius: 4px; }
        .qty-ctrl { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        .qty-btn { width: 28px; height: 28px; background: var(--black); border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; }

        /* Modal Product Detail */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000;
            display: none; padding: 40px 5%; overflow-y: auto;
        }
        .modal-container { max-width: 1200px; margin: 0 auto; display: flex; gap: 50px; flex-wrap: wrap; }
        .modal-gallery { flex: 1.2; min-width: 320px; }
        .modal-info { flex: 1; min-width: 320px; }
        
        .main-view { width: 100%; aspect-ratio: 1; background: var(--gray-dark); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        .main-view img { width: 100%; height: 100%; object-fit: contain; }
        .thumb-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .thumb { width: 80px; height: 80px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; opacity: 0.5; overflow: hidden; flex-shrink: 0; }
        .thumb.active { border-color: var(--accent); opacity: 1; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }

        .p-extra-box {
            margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.03);
            border-left: 3px solid var(--accent); border-radius: 4px; font-size: 14px;
        }

        /* Buttons */
        .btn-primary {
            background: var(--accent); color: var(--white); padding: 16px 32px;
            border-radius: 6px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s; width: fit-content;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(200, 82, 42, 0.3); }

        /* Toast */
        .toast {
    position: fixed;
    bottom: 30px; /* Vị trí khi hiện lên */
    left: 50%;
    /* Đẩy hẳn xuống 200px để giấu triệt để trên mọi loại màn hình */
    transform: translateX(-50%) translateY(200px); 
    background: var(--accent);
    color: white;
    padding: 12px 25px;
    border-radius: 50px;
    z-index: 9999;
    transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    opacity: 0;
    white-space: nowrap;
}

/* Khi có class .show thì kéo về vị trí cũ */
.toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
}

        /* Admin Login */
        .admin-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 4000;
            display: none; align-items: center; justify-content: center;
        }
        .admin-card { background: var(--gray-dark); padding: 40px; border-radius: 15px; width: 350px; text-align: center; }
        .admin-input { width: 100%; padding: 12px; margin: 20px 0; background: var(--black); border: 1px solid var(--border); color: white; border-radius: 6px; text-align: center; }

        /* Responsive Mobile */
        @media (max-width: 992px) {
    .hamburger { display: flex; } /* Hiện hamburger trên mobile */

    .nav-links {
        position: fixed;
        top: 0;
        right: -100%; /* Giấu menu sang phải */
        width: 70%;
        height: 100vh;
        background: var(--black);
        flex-direction: column;
        padding: 100px 40px;
        transition: 0.5s var(--ease);
        z-index: 1000;
        border-left: 1px solid var(--border);
        box-shadow: -20px 0 50px rgba(0,0,0,0.8);
        gap: 20px;
    }

    .nav-links.open {
        right: 0; /* Trượt menu ra */
    }

    .nav-link {
        font-size: 18px; /* Cho chữ to ra cho dễ bấm */
        width: 100%;
        text-align: left;
        padding: 15px 0;
        border-bottom: 1px solid var(--border);
        border-radius: 0;
    }
    
    .nav-link.active {
        background: none;
        color: var(--accent);
    }

    .search-box { width: 120px; }
    .nav-logo img { height: 30px; }
}

        /* ── HAMBURGER ICON ── */
.hamburger {
    display: none; /* Ẩn trên desktop */
    flex-direction: column;
    gap: 5px;
    z-index: 1001;
    padding: 10px;
}
.hamburger span {
    display: block;
    width: 25px;
    height: 2px;
    background: var(--white);
    transition: 0.3s var(--ease);
}

/* Hiệu ứng khi mở Menu (Biến thành dấu X) */
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ── NAV LINKS (DESKTOP) ── */
.nav-links { display: flex; gap: 8px; }

        @media (max-width: 600px) {
            .main-grid { grid-template-columns: repeat(2, 1fr); }
            .product-card { padding: 15px; }
            .card-info h4 { font-size: 13px; height: 38px; }
            .video-grid {
        grid-template-columns: repeat(2, 1fr); /* Mobile dàn 2 cột cho đẹp */
        gap: 10px;
    }
            .modal-container { gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="loader" id="loader">
        <div class="loader-icon"></div>
        <h2 style="font-family: var(--font-display); letter-spacing: 4px;">GARA TÍ HON</h2>
        <p style="font-size: 12px; opacity: 0.5; margin-top: 10px;">Connecting to GTH Lab...</p>
    </div>

    <header>
        <nav>
    <div class="nav-logo" onclick="showPage('home')">
        <img src="https://i.postimg.cc/cCRLRHQ2/icon-copy.png" alt="Gara Tí Hon">
    </div>

    <div class="search-box">
        <i>🔍</i>
        <input type="text" id="global-search" placeholder="Tìm mẫu xe..." oninput="handleSearch()">
    </div>

    <div class="nav-right">
        <button class="cart-trigger" onclick="toggleCart()">
            🛒<span class="cart-badge" id="cart-count">0</span>
        </button>

        <button class="hamburger" id="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

    <div class="nav-links" id="nav-links">
        <button class="nav-link active" onclick="navTo('home', this)">Trang chủ</button>
        <button class="nav-link" onclick="navTo('shop', this)">Cửa hàng</button>
        <button class="nav-link" onclick="navTo('videos-page', this)">Videos</button>
        <button class="nav-link" onclick="navToLogin()" id="btn-login" style="color: var(--accent);">Admin</button>
        <button class="nav-link hide" id="nav-admin" onclick="navTo('admin', this)">Cài đặt</button>
    </div>
</nav>
    </header>

    <main>
        <section id="home" class="page active">
            <div class="hero">
                <div class="hero-content">
                    <h1 id="h-title">...</h1>
                    <p id="h-desc">Đang đồng bộ dữ liệu từ xưởng Gara Tí Hon...</p>
                    <button class="btn-primary" onclick="showPage('shop')">Vào Cửa Hàng</button>
                </div>
                <div class="hero-visual" id="h-imgs"></div>
            </div>
        </section>

        <section id="shop" class="page">
            <div class="shop-layout">
                <aside class="sidebar">
                    <h3>DANH MỤC</h3>
                    <div class="cat-list" id="cat-list"></div>
                </aside>
                <div class="main-grid" id="prod-grid"></div>
            </div>
        </section>

        <section id="videos-page" class="page">
            <div style="padding: 40px 5%;">
                <h2 style="font-family: var(--font-display); font-size: 36px; margin-bottom: 10px;">LATEST VIDEOS</h2>
                <p style="color:var(--gray-light); margin-bottom: 30px;">Cảm hứng độ xe 1:64 từ GTH Lab</p>
                <div class="video-grid" id="video-grid"></div>
            </div>
        </section>

        <section id="admin" class="page">
            <div style="max-width: 600px; margin: 60px auto; padding: 40px; background: var(--gray-dark); border-radius: 15px;">
                <h2 style="font-family: var(--font-display); margin-bottom: 30px;">HỆ THỐNG QUẢN TRỊ</h2>
                <label style="font-size: 12px; color: var(--gray-light);">TIÊU ĐỀ TRANG CHỦ</label>
                <input type="text" id="edit-title" class="admin-input" style="text-align: left;">
                
                <label style="font-size: 12px; color: var(--gray-light);">MÔ TẢ CHI TIẾT</label>
                <textarea id="edit-desc" rows="6" class="admin-input" style="text-align: left;"></textarea>
                
                <button class="btn-primary" style="width: 100%; margin-top: 20px;" onclick="saveAdmin()">Lưu Lên Cloud</button>
            </div>
        </section>
    </main>

    <div class="drawer" id="cart-drawer">
        <div class="drawer-header">
            <h2 style="font-family: var(--font-display);">GIỎ HÀNG</h2>
            <button onclick="toggleCart()" style="font-size: 24px;">✕</button>
        </div>
        <div class="drawer-content" id="cart-items-list"></div>
        <div class="drawer-footer">
            <div style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 600;">
                <span>TỔNG CỘNG</span>
                <span id="cart-total-price" style="color: var(--accent); font-family: var(--font-mono); font-size: 18px;">0₫</span>
            </div>
            <button class="btn-primary" style="width: 100%;" onclick="checkout()">XÁC NHẬN ĐƠN HÀNG</button>
        </div>
    </div>

    <div class="modal" id="modal">
        <button onclick="closeModal()" style="position: fixed; top: 30px; right: 30px; font-size: 30px; color: white; z-index: 3100;">✕</button>
        <div class="modal-container" id="modal-content"></div>
    </div>

    <div class="admin-overlay" id="login-overlay">
        <div class="admin-card">
            <h2 style="font-family: var(--font-display);">GTH ACCESS</h2>
            <input type="password" id="admin-token" class="admin-input" placeholder="Nhập mã bảo mật...">
            <button class="btn-primary" style="width: 100%;" onclick="checkAuth()">XÁC THỰC</button>
            <p onclick="document.getElementById('login-overlay').style.display='none'" style="margin-top: 20px; font-size: 12px; opacity: 0.5; cursor: pointer;">Hủy bỏ</p>
        </div>
    </div>

    <div class="toast" id="toast">🏎️ Đã thêm vào giỏ hàng</div>

    <script>
        const _0x4f2a = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xlLmNvbS9tYWNyb3Mvcy9BS2Z5Y2J3UFl1UVVWak5VY2UySVFXM3EyckdOalBNNEVSQ2VBY3NMbGoyTzZiNVRvY3d6bGJDaV9rRzJHWDFUaG5vRWYzRmcvZXhlYw==";
        const API = atob(_0x4f2a);
        let products = [], categories = [], token = '', videosData = [];
        let cart = JSON.parse(localStorage.getItem('gth_cart')) || [];
        const addSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');

        async function init() {
            renderCart();
            try {
                const res = await fetch(`${API}?action=public_data`);
                const data = await res.json();
                
                if(data.settings) {
                    // Fix lỗi hiển thị <br> từ Sheets
                    document.getElementById('h-title').innerHTML = data.settings.home_title || "GARA TÍ HON";
                    document.getElementById('h-desc').innerHTML = data.settings.home_desc || "";
                    if(data.settings.home_imgs) {
                        const imgs = data.settings.home_imgs.split(',');
                        document.getElementById('h-imgs').innerHTML = imgs.map(link => `
                            <div class="img-card"><img src="${link.trim()}" onerror="this.src='🏎️'"></div>
                        `).join('');
                    }
                }
                
                products = data.products || [];
                categories = data.categories || [];
                videosData = data.videos || [];
                
                renderShop();
                renderVideos();
                
                // Ẩn loader
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);

            } catch(e) {
                console.error("Initialization Error:", e);
                document.getElementById('loader').style.display = 'none';
            }
        }

        function renderShop() {
            const catHTML = `<button class="cat-item active" onclick="filterCat('all', this)">TẤT CẢ</button>` + 
                categories.map(c => `<button class="cat-item" onclick="filterCat('${c.key}', this)">${c.name.toUpperCase()}</button>`).join('');
            document.getElementById('cat-list').innerHTML = catHTML;
            renderProducts();
        }

        function renderProducts(cat = 'all') {
            const source = cat === 'all' ? products : products.filter(p => p.cat === cat);
            document.getElementById('prod-grid').innerHTML = source.map(p => `
                <div class="product-card" onclick="openDetail('${p.id}')">
                    <div class="card-img">
                        <img src="${p.images ? p.images[0] : '🏎️'}" loading="lazy" onerror="this.src='🏎️'">
                    </div>
                    <div class="card-info">
                        <h4>${p.name}</h4>
                        <div class="card-price">${Number(p.price).toLocaleString()}₫</div>
                    </div>
                </div>
            `).join('');
        }

        function handleSearch() {
            const query = document.getElementById('global-search').value.toLowerCase().trim();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(query) || (p.desc && p.desc.toLowerCase().includes(query))
            );
            if (query !== "") showPage('shop');
            const grid = document.getElementById('prod-grid');
            grid.innerHTML = filtered.length === 0 
                ? `<div style="grid-column: 1/-1; padding: 100px 0; text-align: center; opacity: 0.5;">Không tìm thấy mẫu xe nào khớp với "${query}"</div>`
                : filtered.map(p => `
                    <div class="product-card" onclick="openDetail('${p.id}')">
                        <div class="card-img"><img src="${p.images[0]}"></div>
                        <div class="card-info"><h4>${p.name}</h4><div class="card-price">${Number(p.price).toLocaleString()}₫</div></div>
                    </div>
                `).join('');
        }

        function renderVideos() {
    const grid = document.getElementById('video-grid');
    if (!videosData || videosData.length === 0) {
        grid.innerHTML = '<p style="text-align:center; opacity:0.5; grid-column: 1/-1;">Chưa có video nào từ Lab.</p>';
        return;
    }

    grid.innerHTML = videosData.map(v => {
        const link = v.key ? v.key.trim() : "";
        if (!link) return "";

        let embedUrl = "";

        // 1. XỬ LÝ YOUTUBE (Regex chuẩn xác hơn)
        const ytMatch = link.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
        if (ytMatch && ytMatch[1]) {
            embedUrl = `https://www.youtube.com/embed/${ytMatch[1]}?modestbranding=1&rel=0&hl=vi`;
        }

        // 2. XỬ LÝ TIKTOK (Nếu Sơn có bỏ link TikTok vào Sheets)
        else if (link.includes('tiktok.com')) {
            const ttMatch = link.match(/\/video\/(\d+)/);
            if (ttMatch && ttMatch[1]) {
                embedUrl = `https://www.tiktok.com/embed/v2/${ttMatch[1]}`;
            }
        }

        if (!embedUrl) return ""; // Link không hợp lệ thì bỏ qua

        return `
            <div class="video-card">
                <iframe 
                    src="${embedUrl}" 
                    loading="lazy" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>`;
    }).join('');
}

        function openDetail(id) {
            const p = products.find(x => x.id == id);
            const imgs = (p.images && p.images.length) ? p.images : ["🏎️"];
            const extraContent = p.extra ? `<div class="p-extra-box"><strong>THÔNG TIN THÊM:</strong><br>${p.extra.replace(/\n/g, '<br>')}</div>` : '';

            document.getElementById('modal-content').innerHTML = `
                <div class="modal-gallery">
                    <div class="main-view"><img id="main-view" src="${imgs[0]}"></div>
                    <div class="thumb-list">
                        ${imgs.map((img, i) => `<div class="thumb ${i==0?'active':''}" onclick="changeImg(this, '${img}')"><img src="${img}"></div>`).join('')}
                    </div>
                </div>
                <div class="modal-info">
                    <p style="font-family: var(--font-mono); color: var(--accent); font-size: 12px; letter-spacing: 2px;">1:64 ARTISAN SCALE</p>
                    <h1 style="font-family: var(--font-display); font-size: 40px; line-height: 1.1; margin: 15px 0;">${p.name}</h1>
                    <div style="font-family: var(--font-mono); font-size: 24px; color: var(--accent); font-weight: 700; margin-bottom: 25px;">${Number(p.price).toLocaleString()}₫</div>
                    
                    <button class="btn-primary" style="width: 100%; margin-bottom: 30px;" onclick="addToCart('${p.id}')">THÊM VÀO GIỎ HÀNG</button>
                    
                    <div style="font-size: 14px; color: var(--gray-light); line-height: 1.8;">
                        <strong style="color: white;">MÔ TẢ:</strong><br>${p.desc.replace(/\n/g, '<br>')}
                    </div>
                    ${extraContent}
                </div>`;
            
            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function changeImg(el, src) {
            document.getElementById('main-view').src = src;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function toggleCart() { document.getElementById('cart-drawer').classList.toggle('open'); }

        function addToCart(id) {
            const p = products.find(x => x.id == id);
            const exists = cart.find(x => x.id == id);
            if(exists) exists.qty++; else cart.push({ ...p, qty: 1 });
            saveCart(); renderCart(); closeModal();
            
            addSound.currentTime = 0;
            addSound.play().catch(e => {});
            
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function updateQty(id, delta) {
            const item = cart.find(x => x.id == id);
            if(item) { item.qty += delta; if(item.qty <= 0) cart = cart.filter(x => x.id != id); }
            saveCart(); renderCart();
        }

        function renderCart() {
            const list = document.getElementById('cart-items-list');
            let total = 0, count = 0;
            list.innerHTML = cart.length === 0 ? '<p style="text-align:center; opacity:0.3; margin-top:50px;">Giỏ hàng đang trống.</p>' : 
            cart.map(item => {
                total += item.price * item.qty; count += item.qty;
                return `
                <div class="cart-item">
                    <img src="${item.images[0]}">
                    <div style="flex:1">
                        <div style="font-size:13px; font-weight:600;">${item.name}</div>
                        <div style="color:var(--accent); font-family:var(--font-mono); font-size:12px;">${Number(item.price).toLocaleString()}₫</div>
                        <div class="qty-ctrl">
                            <button class="qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
                            <span style="font-size:13px;">${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            document.getElementById('cart-total-price').textContent = total.toLocaleString() + '₫';
            document.getElementById('cart-count').textContent = count;
        }

        async function checkout() {
            if(!cart.length) return;
            let orderDetails = "📦 ĐƠN HÀNG GARA TÍ HON\n--------------------------\n";
            cart.forEach((item, i) => orderDetails += `${i + 1}. ${item.name} (x${item.qty}) - ${Number(item.price * item.qty).toLocaleString()}₫\n`);
            orderDetails += `--------------------------\n💰 TỔNG: ${document.getElementById('cart-total-price').textContent}\n\n🏠 Thông tin nhận hàng:\n- Họ tên:\n- SĐT:\n- Địa chỉ:`;
            
            try {
                await navigator.clipboard.writeText(orderDetails);
                alert("✅ Đã sao chép đơn hàng! Hãy dán vào Zalo cho Sơn nhé.");
                window.open(`https://zalo.me/0901234567`); // Nhớ thay số của Sơn
            } catch (err) { alert("Lỗi sao chép đơn hàng!"); }
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) {
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                el.classList.add('active');
            }
            window.scrollTo(0,0);
        }

        function filterCat(key, el) {
            document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderProducts(key);
        }

        function openLogin() { document.getElementById('login-overlay').style.display = 'flex'; }
        function checkAuth() {
            const val = document.getElementById('admin-token').value;
            if(val.trim() !== "") {
                token = val;
                document.getElementById('nav-admin').classList.remove('hide');
                document.getElementById('btn-login').classList.add('hide');
                document.getElementById('login-overlay').style.display = 'none';
                showPage('admin');
                document.getElementById('edit-title').value = document.getElementById('h-title').innerText;
                document.getElementById('edit-desc').value = document.getElementById('h-desc').innerText;
            }
        }

        async function saveAdmin() {
            const btn = event.target;
            btn.innerText = "ĐANG LƯU..."; btn.disabled = true;
            const payload = { 
                token: token, action: 'save_home', 
                title: document.getElementById('edit-title').value, 
                desc: document.getElementById('edit-desc').value 
            };
            try {
                const res = await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.status === 'success') { alert("✅ Đã cập nhật!"); location.reload(); }
                else alert("❌ Lỗi: " + result.message);
            } catch(e) { alert("❌ Lỗi kết nối."); }
            btn.innerText = "LƯU LÊN CLOUD"; btn.disabled = false;
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function saveCart() { localStorage.setItem('gth_cart', JSON.stringify(cart)); }

        function toggleMenu() {
    const navLinks = document.getElementById('nav-links');
    const hamburger = document.getElementById('hamburger');
    
    navLinks.classList.toggle('open');
    hamburger.classList.toggle('open');
}

// Hàm bổ trợ để khi bấm vào link thì tự đóng menu luôn
function navTo(pageId, el) {
    showPage(pageId, el);
    // Nếu đang ở mobile thì đóng menu sau khi chọn trang
    if (window.innerWidth <= 992) {
        toggleMenu();
    }
}

function navToLogin() {
    openLogin();
    if (window.innerWidth <= 992) {
        toggleMenu();
    }
}

        init();
    </script>
</body>
</html>
